# ─── Netlify Configuration ────────────────────────────────────────
[build]
  base    = "frontend"          # run build commands from here
  command = "npm run build"
  publish = "frontend/out"      # folder Netlify deploys

# ─── SPA Redirect (React Router / client-side routing) ────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers ─────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ─── Long-cache for built assets ──────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
